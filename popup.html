<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moodle Bulk Downloader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      min-height: 200px;
    }

    .header {
      background: linear-gradient(135deg, #1a1f2e 0%, #0f1117 100%);
      padding: 16px 18px 14px;
      border-bottom: 1px solid #1e2535;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #4f6ef7, #7c3aed);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.01em;
    }

    .header-text p {
      font-size: 11px;
      color: #6b7280;
      margin-top: 1px;
    }

    .content {
      padding: 14px 18px;
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .filter-btn {
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid #2a2f42;
      background: transparent;
      color: #9ca3af;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: #4f6ef7; color: #c7d2fe; }
    .filter-btn.active {
      background: #1e2a5e;
      border-color: #4f6ef7;
      color: #a5b4fc;
    }

    /* File list */
    .file-list {
      max-height: 260px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }

    .file-list::-webkit-scrollbar { width: 4px; }
    .file-list::-webkit-scrollbar-track { background: transparent; }
    .file-list::-webkit-scrollbar-thumb { background: #2a2f42; border-radius: 4px; }

    .file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #161b27;
      border: 1px solid #1e2535;
      transition: border-color 0.15s;
      cursor: pointer;
    }

    .file-item:hover { border-color: #2a3555; }
    .file-item.selected { border-color: #4f6ef7; background: #131a35; }

    .file-checkbox {
      width: 16px;
      height: 16px;
      border: 1.5px solid #374151;
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .file-item.selected .file-checkbox {
      background: #4f6ef7;
      border-color: #4f6ef7;
    }

    .file-item.selected .file-checkbox::after {
      content: '✓';
      color: white;
      font-size: 10px;
      font-weight: 700;
    }

    .ext-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 4px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .ext-pdf { background: #3b1515; color: #f87171; }
    .ext-docx, .ext-doc { background: #132240; color: #60a5fa; }
    .ext-pptx, .ext-ppt { background: #2d1a0e; color: #fb923c; }
    .ext-txt { background: #1a2e1a; color: #4ade80; }
    .ext-xlsx, .ext-xls { background: #0f2a1e; color: #34d399; }
    .ext-zip { background: #2a1f3a; color: #c084fc; }
    .ext-file { background: #1e2535; color: #9ca3af; }

    .file-name {
      font-size: 12px;
      color: #d1d5db;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    /* States */
    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: #4b5563;
    }

    .empty-state .emoji { font-size: 32px; margin-bottom: 10px; }
    .empty-state p { font-size: 13px; line-height: 1.5; }
    .empty-state small { font-size: 11px; color: #374151; margin-top: 6px; display: block; }

    /* Footer */
    .footer {
      border-top: 1px solid #1e2535;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .select-all {
      font-size: 11px;
      color: #6b7280;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
    }
    .select-all:hover { color: #a5b4fc; }

    .count-label {
      font-size: 11px;
      color: #4b5563;
    }

    .download-btn {
      padding: 8px 18px;
      background: linear-gradient(135deg, #4f6ef7, #7c3aed);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .download-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .download-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* Progress */
    .progress-bar-wrap {
      height: 2px;
      background: #1e2535;
      margin: 0 18px 10px;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4f6ef7, #7c3aed);
      border-radius: 2px;
      transition: width 0.3s;
      width: 0%;
    }

    .status-msg {
      font-size: 11px;
      color: #6b7280;
      padding: 0 18px 8px;
      display: none;
    }

    .scanning {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      gap: 8px;
      color: #6b7280;
      font-size: 12px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #1e2535;
      border-top-color: #4f6ef7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">📦</div>
    <div class="header-text">
      <h1>Moodle Bulk Downloader</h1>
      <p>Download all course materials at once</p>
    </div>
  </div>

  <div id="scanning-state" class="scanning">
    <div class="spinner"></div>
    Scanning page...
  </div>

  <div id="main" style="display:none">
    <div class="content">
      <div class="filter-bar" id="filterBar"></div>
      <div class="file-list" id="fileList"></div>
    </div>

    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="status-msg" id="statusMsg"></div>

    <div class="footer">
      <span class="select-all" id="selectAll">Select all</span>
      <span class="count-label" id="countLabel"></span>
      <button class="download-btn" id="downloadBtn" disabled>
        ⬇ Download
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
